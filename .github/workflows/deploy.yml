name: Deploy to AWS

on:
  push:
    branches: [main]

# Only allow one deployment at a time
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required for OIDC auth to AWS
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-2' }}

      - name: Trigger CodeDeploy deployment
        run: |
          DESC="Deploy ${GITHUB_SHA::7}"
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name meal-planner \
            --deployment-group-name meal-planner-ec2 \
            --github-location repository=${{ github.repository }},commitId=${{ github.sha }} \
            --description "$DESC" \
            --query 'deploymentId' \
            --output text)
          echo "Deployment started: $DEPLOYMENT_ID"
          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV

      - name: Wait for deployment to complete
        run: |
          echo "Waiting for deployment $DEPLOYMENT_ID..."
          aws deploy wait deployment-successful --deployment-id "$DEPLOYMENT_ID"
          echo "Deployment completed successfully."
